<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CreditWise AI - Credit Card Approval System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; margin: 0; color: #333; }
        .nav-bar { display: flex; justify-content: center; background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; font-weight: 500; font-size: 14px; gap: 30px; }
        .nav-bar a { text-decoration: none; color: #4a5568; }
        .hero { text-align: center; max-width: 700px; margin: 50px auto; padding: 0 20px; }
        .hero h1 { color: #0052cc; font-size: 32px; margin-bottom: 15px; }
        .hero p { color: #718096; font-size: 16px; margin-bottom: 25px; }
        .start-btn { background: #0052cc; color: white; padding: 12px 30px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 15px; text-decoration:none; }
        .container { max-width: 800px; background: white; padding: 40px; margin: 40px auto; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3.section-title { text-align: center; font-size: 24px; color: #2d3748; margin-bottom: 40px; }
        .grid-form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; color: #4a5568; font-weight: 600; margin-bottom: 8px; }
        input, select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; background: #fff; width: 100%; height: 45px; }
        .btn-container { grid-column: span 2; text-align: center; margin-top: 30px; }
        .predict-btn { width: 100%; background: #0052cc; color: white; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Loading Animation Overlay overlay */
        #loading-overlay { display: none; position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0, 82, 204, 0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid white; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="#">Home</a><a href="#">Predict</a><a href="#">Features</a><a href="#">About</a>
    </div>
    
    <div class="hero">
        <h1>AI Powered Credit Card Approval Prediction</h1>
        <p>Predict credit card approval instantly using Machine Learning. Fast, Secure and Accurate.</p>
        <button class="start-btn" onclick="document.getElementById('prediction-section').scrollIntoView({behavior: 'smooth'});">Start Prediction</button>
    </div>

    <div class="container" id="prediction-section">
        <h3 class="section-title">Applicant Information</h3>
        <form action="/predict" method="POST" onsubmit="showLoading();">
            <div class="grid-form">
                <div class="form-group"><label>Gender</label><select name="g"><option value="0">Female</option><option value="1">Male</option></select></div>
                <div class="form-group"><label>Own Car</label><select name="car"><option value="1">Yes</option><option value="0">No</option></select></div>
                <div class="form-group"><label>Own House</label><select name="realty"><option value="1">Yes</option><option value="0">No</option></select></div>
                <div class="form-group"><label>Total Annual Income ($)</label><input type="number" name="inc" placeholder="Annual Income" required></div>
                <div class="form-group"><label>Income Type</label><select name="inc_type"><option value="1">Working</option><option value="0">Commercial associate</option><option value="2">Pensioner</option></select></div>
                <div class="form-group"><label>Education</label><select name="edu"><option value="1">Secondary / secondary special</option><option value="0">Higher education</option></select></div>
                <div class="form-group"><label>Family Status</label><select name="fam"><option value="0">Married</option><option value="1">Single / not married</option></select></div>
                <div class="form-group"><label>Housing Type</label><select name="house"><option value="0">House / apartment</option><option value="1">Rented apartment</option></select></div>
                <div class="form-group"><label>Age (Years)</label><input type="number" name="age_years" placeholder="Age" required></div>
                <div class="form-group"><label>Employment Years</label><input type="number" name="exp_years" placeholder="Employment Years" required></div>
                <div class="form-group"><label>Family Members</label><input type="number" name="fam_mem" placeholder="Family Members" required></div>
                <div class="btn-container"><button type="submit" class="predict-btn">⚡ Predict Credit Approval</button></div>
            </div>
        </form>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2 style="font-weight:normal; letter-spacing:1px;">Analyzing Application...</h2>
        <p style="opacity:0.8; font-size:14px;">AI is evaluating applicant information.</p>
    </div>

    <script>
        function showLoading() { document.getElementById('loading-overlay').style.display = 'flex'; }
    </script>
</body>
</html>

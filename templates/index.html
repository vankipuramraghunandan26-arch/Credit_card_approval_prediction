<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction UI</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .header-bar { background: #2c3e50; color: white; padding: 15px; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .container { max-width: 800px; background: white; padding: 30px; margin: auto; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; margin-bottom: 30px; font-weight: normal; }
        .grid-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: #fff; box-sizing: border-box; width: 100%; height: 40px; }
        .btn-container { grid-column: span 3; margin-top: 20px; }
        button { width: 100%; background: #1890ff; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #40a9ff; }
    </style>
</head>
<body>
    <div class="header-bar">SmartBridge</div>
    <div class="container">
        <h2>Credit Card Approval Prediction</h2>
        <form action="/predict" method="POST">
            <div class="grid-form">
                <!-- Row 1 -->
                <div class="form-group">
                    <label>Gender</label>
                    <select name="g">
                        <option value="0">FEMALE</option>
                        <option value="1">MALE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Own Car or Not</label>
                    <select name="car">
                        <option value="1">YES</option>
                        <option value="0">NO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Own Realstate</label>
                    <select name="realty">
                        <option value="1">YES</option>
                        <option value="0">NO</option>
                    </select>
                </div>

                <!-- Row 2 -->
                <div class="form-group">
                    <label>Total Anual Income</label>
                    <input type="number" name="inc" placeholder="50000" required>
                </div>
                <div class="form-group">
                    <label>Type of Income</label>
                    <select name="inc_type">
                        <option value="0">Pensioner</option>
                        <option value="1">Working</option>
                        <option value="2">Commercial associate</option>
                        <option value="3">State servant</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Education</label>
                    <select name="edu">
                        <option value="0">Higher education</option>
                        <option value="1">Secondary / secondary special</option>
                        <option value="2">Incomplete higher</option>
                    </select>
                </div>

                <!-- Row 3 -->
                <div class="form-group">
                    <label>Family Status</label>
                    <select name="fam">
                        <option value="0">Married</option>
                        <option value="1">Single / not married</option>
                        <option value="2">Civil marriage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type of Housing</label>
                    <select name="house">
                        <option value="0">House / apartment</option>
                        <option value="1">With parents</option>
                        <option value="2">Rented apartment</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Days Birth</label>
                    <input type="number" step="any" name="age" placeholder="29.334247" required>
                </div>

                <!-- Row 4 -->
                <div class="form-group">
                    <label>Days Employed</label>
                    <input type="number" step="any" name="ye" placeholder="-2.095890" required>
                </div>
                <div class="form-group">
                    <label>Family Members</label>
                    <input type="number" name="fam_mem" placeholder="2" required>
                </div>
                <div class="form-group">
                    <label>EMI Paid Off</label>
                    <input type="number" name="emi_paid" placeholder="4" required>
                </div>

                <!-- Row 5 -->
                <div class="form-group">
                    <label>EMI of Pastdues</label>
                    <input type="number" name="emi_past" placeholder="1" required>
                </div>
                <div class="form-group">
                    <label>Number of Loans</label>
                    <input type="number" name="loans" placeholder="2" required>
                </div>

                <!-- Submit Button -->
                <div class="btn-container">
                    <button type="submit">Predict</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>

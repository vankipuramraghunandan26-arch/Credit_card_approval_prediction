<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Deployment UI</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 40px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #0050b3; }
        .input-box { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #1890ff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>SmartBridge Credit Card Approval Prediction</h2>
        <form action="/predict" method="POST">
            <div class="input-box"><label>Gender (0=F, 1=M):</label><input type="number" name="g" value="0"></div>
            <div class="input-box"><label>Own Car (0=N, 1=Y):</label><input type="number" name="car" value="1"></div>
            <div class="input-box"><label>Own Realty (0=N, 1=Y):</label><input type="number" name="r" value="1"></div>
            <div class="input-box"><label>Children Count:</label><input type="number" name="ch" value="0"></div>
            <div class="input-box"><label>Total Annual Income ($):</label><input type="number" name="inc" value="427500"></div>
            <div class="input-box"><label>Income Type Category code:</label><input type="number" name="inc_t" value="3"></div>
            <div class="input-box"><label>Education Level code:</label><input type="number" name="edu" value="1"></div>
            <div class="input-box"><label>Family Status Code:</label><input type="number" name="fam" value="1"></div>
            <div class="input-box"><label>Housing Type Code:</label><input type="number" name="house" value="1"></div>
            <div class="input-box"><label>Work Phone Flag (0/1):</label><input type="number" name="wp" value="1"></div>
            <div class="input-box"><label>Phone Flag (0/1):</label><input type="number" name="pf" value="0"></div>
            <div class="input-box"><label>Email Flag (0/1):</label><input type="number" name="ef" value="0"></div>
            <div class="input-box"><label>Occupation Type Code:</label><input type="number" name="occ" value="4"></div>
            <div class="input-box"><label>Family Members Count:</label><input type="number" name="fmc" value="2"></div>
            <div class="input-box"><label>Applicant Age (Years):</label><input type="number" name="age" value="32"></div>
            <div class="input-box"><label>Years of Employment:</label><input type="number" name="ye" value="12"></div>
            <button type="submit">Predict Status</button>
        </form>
    </div>
</body>
</html>
